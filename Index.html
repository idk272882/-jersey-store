<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Football Jersey Store</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:Arial, Helvetica, sans-serif;

}

body{

    background:#f5f5f5;

}

header{

    background:#111;

    color:white;

    padding:20px;

    display:flex;

    justify-content:space-between;

    align-items:center;

}

header h1{

    color:#00d084;

}

nav a{

    color:white;

    text-decoration:none;

    margin-left:20px;

}

.hero{

    background:linear-gradient(to right,#00d084,#008c5a);

    color:white;

    text-align:center;

    padding:80px 20px;

}

.hero h2{

    font-size:48px;

}

.hero p{

    margin:20px 0;

    font-size:20px;

}

button{

    padding:12px 25px;

    border:none;

    background:#111;

    color:white;

    border-radius:5px;

    cursor:pointer;

}

.products{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:20px;

    padding:50px;

}

.card{

    background:white;

    border-radius:10px;

    overflow:hidden;

    box-shadow:0 4px 10px rgba(0,0,0,.1);

    transition:.3s;

}

.card:hover{

    transform:translateY(-8px);

}

.card img{

    width:100%;

    height:300px;

    object-fit:cover;

}

.card-content{

    padding:20px;

    text-align:center;

}

.price{

    color:#00a86b;

    font-size:24px;

    margin:10px 0;

}

footer{

    background:#111;

    color:white;

    text-align:center;

    padding:20px;

}

</style>

</head>

<body>

<header>

<h1>⚽ JerseyHub</h1>

<nav>

<a href="#">Home</a>

<a href="#">Shop</a>

<a href="#">About</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<h2>Official Football Jerseys</h2>

<p>Find your favourite club jerseys at the best prices.</p>

<button>Shop Now</button>

</section>

<section class="products">

<div class="card">

<img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?w=600" alt="">

<div class="card-content">

<h3>Manchester United</h3>

<p class="price">$79.99</p>

<button>Add to Cart</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a?w=600" alt="">

<div class="card-content">

<h3>Real Madrid</h3>

<p class="price">$84.99</p>

<button>Add to Cart</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1511886929837-354d827aae26?w=600" alt="">

<div class="card-content">

<h3>Barcelona</h3>

<p class="price">$82.99</p>

<button>Add to Cart</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1547347298-4074fc3086f0?w=600" alt="">

<div class="card-content">

<h3>Paris Saint-Germain</h3>

<p class="price">$89.99</p>

<button>Add to Cart</button>

</div>

</div>

</section>

<footer>

<p>© 2026 JerseyHub | Football Jersey Store</p>

</footer>

</body>

</html>
